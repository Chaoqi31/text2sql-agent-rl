# R1 agentic GRPO — mini scale (spec §9). Paths are the AutoDL box layout (setup_autodl.sh).
base_model: "/root/autodl-tmp/text2sql/models/Qwen3.5-9B"
run_name: "sqlrl-r2-v3"
train_jsonl: "/root/autodl-tmp/text2sql/bird/train_exec_filtered.jsonl"   # gold execution-filtered (scripts/filter_data.py)
db_root: "/root/autodl-tmp/text2sql/bird/train/train_databases"
reward_arm: "r2"            # R2 is the shipped reward; --reward-arm still overrides (r1/r2/r3/s0)

# GRPO loop — scaled up from the 60-step pilot (the back half is where EX gain showed)
steps: 300
scenarios_per_step: 8
group_size: 4            # B6000 96GB: group 8 OOM'd at step 0; 4 still a valid group-relative baseline
learning_rate: 1.0e-5
kl_coef: 0.0

# rollout
max_turns: 8
temperature: 0.7
max_tokens: 1024         # raised from 768: headroom for reasoning + FINAL SQL without clipping

# LoRA — target_modules FINALIZED in Phase -1 by dumping Qwen3.5 module tree.
# DeltaNet (linear_attention) layers lack q/k/v/o_proj; baseline = MLP + full_attention proj.
lora_rank: 16
lora_alpha: 32
# Qwen3.5 module dump (Phase -1.2): 32 layers = 24 linear_attn (DeltaNet) + 8 full_attention.
# MLP gate/up/down on all 32; q/k/v/o_proj exist on the 8 full_attention layers. DeltaNet
# in_proj_*/out_proj left un-adapted for R1 (opt-in later).
lora_target_modules: ["gate_proj", "up_proj", "down_proj", "q_proj", "k_proj", "v_proj", "o_proj"]
vllm_gpu_memory_utilization: 0.30   # leave ~66GB for training (colocate); 0.40 starved it -> OOM
